name: Pull request

on: pull_request

jobs:
  build:
    name: Pull request
    runs-on: ubuntu-latest
    # env:
    #   CLOUDSMITH_NPM_REGISTRY_TOKEN: ${{ secrets.CLOUDSMITH_NPM_RO_TOKEN }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        env:
          NODE_AUTH_TOKEN: ${{ secrets.CLOUDSMITH_NPM_RO_TOKEN }}
        with:
          node-version: "22.x"
          registry-url: //${{ vars.CLOUDSMITH_NPM_URL }}/npm/

      - name: Enable Corepack and pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10.29.2 --activate

      - name: Debug
        run: pnpm config list

      - name: Install dependencies
        run: pnpm install --reporter=ndjson

      - name: Run linting
        run: pnpm run lint

      - name: Install Playwright browser for tests
        run: pnpm --filter=@ourfuturehealth/react-components exec playwright install --with-deps chromium

      - name: Run tests
        run: pnpm test
